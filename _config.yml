# ─────────────────────────────────────────
# Site Settings
# ─────────────────────────────────────────
title: Aaron Snowberger — Courses
first_name: Aaron
last_name: Snowberger
email: aaronkr.trainer@gmail.com
description: >
  Courses taught by Prof. Aaron Snowberger at five Korean universities.
lang: en

url: https://courses.aaron.kr
baseurl: ""

icon: /assets/img/aaron.jpg

# ─────────────────────────────────────────
# SEO / Open Graph defaults
# ─────────────────────────────────────────
logo: /assets/img/aaron.jpg

social:
  name: Aaron Snowberger
  links:
    - https://github.com/aaronkr-courses
    - https://linkedin.com/in/aaronsnowberger
    - https://scholar.google.com/citations?user=JCbnnvUAAAAJ
    - https://orcid.org/0000-0001-8652-0936

twitter:
  username: aaronkr

# ─────────────────────────────────────────
# Social
# ─────────────────────────────────────────
github_username: aaronkr-courses
linkedin_username: aaronsnowberger
scholar_userid: JCbnnvUAAAAJ
orcid_id: 0000-0001-8652-0936
kaggle_id: aaronsnowberger
research_gate_profile: Aaron-Snowberger

# ─────────────────────────────────────────
# Layout
# ─────────────────────────────────────────
navbar_fixed: true

# ─────────────────────────────────────────
# Collections
# ─────────────────────────────────────────
collections:
  courses:
    output: true
    permalink: /courses/:path/

# Course category display order (newest first)
course_categories:
  - label: "2026-1"
    label_ko: "2026년 1학기"
    key: "2026-1"
  - label: "2025-2"
    label_ko: "2025년 2학기"
    key: "2025-2"
  - label: "2025-1"
    label_ko: "2025년 1학기"
    key: "2025-1"
  - label: "2024-2"
    label_ko: "2024년 2학기"
    key: "2024-2"
  - label: "2024-1"
    label_ko: "2024년 1학기"
    key: "2024-1"
  - label: "2023"
    label_ko: "2023년"
    key: "2023"
  - label: "Special / HS"
    label_ko: "특수 / 고등학교"
    key: "Special"
  - label: "Online Courses"
    label_ko: "온라인 강의"
    key: "Online"

# ─────────────────────────────────────────
# Jekyll Settings
# ─────────────────────────────────────────
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"

include: ["_pages"]
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - "*.old.html"
  - node_modules/
  - bin/
  - 2023-course-sites/
  - 2023-migration-notes.md
  - CLAUDE.md

# ─────────────────────────────────────────
# Plugins (GitHub Pages compatible)
# ─────────────────────────────────────────
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# ─────────────────────────────────────────
# Defaults
# ─────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: "courses"
    values:
      layout: course
  - scope:
      path: "_pages"
    values:
      layout: page
  - scope:
      path: "attend"
    values:
      sitemap: false
  - scope:
      path: "assets/pdf"
    values:
      sitemap: false

