name: Compress Images

on:
  push:
    branches: [main]
    paths:
      - "assets/img/**/*.jpg"
      - "assets/img/**/*.jpeg"
      - "assets/img/**/*.png"
      - "assets/img/**/*.webp"

jobs:
  compress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compress images
        uses: calibreapp/image-actions@main
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          compressOnly: true
          jpegQuality: "82"
          pngQuality: "85"
          webpQuality: "85"
          ignorePaths: "_site/**"
