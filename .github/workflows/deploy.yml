name: Build, Deploy & Update Stats

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 0 1 * *"   # monthly stats refresh
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 — Update GitHub stats (push + monthly schedule)
#   Needs contents: write to commit _data/github.json back to the repo.
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch GitHub stats
        run: node scripts/fetch-github-stats.js

      - name: Commit updated stats
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add _data/github.json
          git commit -m "chore: update GitHub repo stats" || echo "No changes to commit"
          git push

# ──────────────────────────────────────────────────────────────────────────────
# Job 2 — Lint YAML data files (push / manual only, skipped on schedule)
# ──────────────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint --quiet

      - name: Lint _data/ YAML files
        # Warnings only — does not fail the build, but surfaces issues in the Actions log.
        run: |
          yamllint \
            -d '{extends: relaxed, rules: {line-length: {max: 300}, truthy: disable}}' \
            _data/ _config.yml || true

# ──────────────────────────────────────────────────────────────────────────────
# Job 3 — Build Jekyll site (push / manual only)
#   Injects Firebase credentials from GitHub Secrets before building.
# ──────────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Generate attend/firebase-config.js from GitHub Secrets ──────────────
      # Add secrets at: GitHub repo → Settings → Secrets and variables → Actions
      - name: Inject Firebase config
        env:
          FIREBASE_API_KEY:        ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID:     ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SENDER_ID:      ${{ secrets.FIREBASE_SENDER_ID }}
          FIREBASE_APP_ID:         ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          PROFESSOR_EMAIL:         ${{ secrets.PROFESSOR_EMAIL }}
        run: |
          cp attend/firebase-config.example.js attend/firebase-config.js
          sed -i "s|YOUR_API_KEY|${FIREBASE_API_KEY}|g"               attend/firebase-config.js
          sed -i "s|YOUR_PROJECT_ID|${FIREBASE_PROJECT_ID}|g"         attend/firebase-config.js
          sed -i "s|YOUR_SENDER_ID|${FIREBASE_SENDER_ID}|g"           attend/firebase-config.js
          sed -i "s|YOUR_APP_ID|${FIREBASE_APP_ID}|g"                 attend/firebase-config.js
          sed -i "s|your-email@gmail.com|${PROFESSOR_EMAIL}|g"        attend/firebase-config.js
          if [ -z "${FIREBASE_MEASUREMENT_ID}" ]; then
            sed -i '/measurementId/d' attend/firebase-config.js
          else
            sed -i "s|YOUR_MEASUREMENT_ID|${FIREBASE_MEASUREMENT_ID}|g" attend/firebase-config.js
          fi
          # Fail fast if any placeholder was not replaced
          if grep -q "YOUR_" attend/firebase-config.js; then
            echo "ERROR: unreplaced placeholders in firebase-config.js:" >&2
            grep "YOUR_" attend/firebase-config.js >&2
            exit 1
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

# ──────────────────────────────────────────────────────────────────────────────
# Job 4 — Deploy to GitHub Pages
# ──────────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
