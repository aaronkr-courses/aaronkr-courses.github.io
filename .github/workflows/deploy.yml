name: Deploy Jekyll site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:          # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false   # don't cancel in-flight deployments

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Generate attend/firebase-config.js from GitHub Secrets ──
      # Secrets are set at: GitHub repo → Settings → Secrets and variables → Actions
      - name: Inject Firebase config
        env:
          FIREBASE_API_KEY:         ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID:      ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SENDER_ID:       ${{ secrets.FIREBASE_SENDER_ID }}
          FIREBASE_APP_ID:          ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID:  ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          PROFESSOR_EMAIL:          ${{ secrets.PROFESSOR_EMAIL }}
        run: |
          cp attend/firebase-config.example.js attend/firebase-config.js
          sed -i "s|YOUR_API_KEY|${FIREBASE_API_KEY}|g"               attend/firebase-config.js
          sed -i "s|YOUR_PROJECT_ID|${FIREBASE_PROJECT_ID}|g"         attend/firebase-config.js
          sed -i "s|YOUR_SENDER_ID|${FIREBASE_SENDER_ID}|g"           attend/firebase-config.js
          sed -i "s|YOUR_APP_ID|${FIREBASE_APP_ID}|g"                 attend/firebase-config.js
          sed -i "s|YOUR_MEASUREMENT_ID|${FIREBASE_MEASUREMENT_ID}|g" attend/firebase-config.js
          sed -i "s|your-email@gmail.com|${PROFESSOR_EMAIL}|g"        attend/firebase-config.js

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true   # caches gems between runs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
