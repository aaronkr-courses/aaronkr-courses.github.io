---
layout: default
---
<div class="wrap">
  <header style="padding: 60px 0 36px; border-bottom: 1px solid var(--border);">
    {% if page.eyebrow %}
    <div class="eyebrow">{{ page.eyebrow }}</div>
    {% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
    <p style="font-size:1rem;color:var(--sub);margin-top:8px;">{{ page.subtitle }}</p>
    {% endif %}
  </header>
  <main style="padding: 40px 0 80px;">
    {{ content }}
  </main>
</div>
